<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentKit Graphify — 3D Code Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0E13;--bg2:rgba(14,18,23,0.94);
  --fg:#E6EBF2;--fg2:rgba(230,235,242,0.55);--fg3:rgba(230,235,242,0.3);
  --green:#6FCF97;--blue:#7AA7FF;--gold:#F2C66D;--amber:#F2A65A;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --font:Inter,-apple-system,system-ui,sans-serif;
  --mono:'JetBrains Mono','SF Mono',Menlo,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);overflow:hidden}
canvas{display:block}
#main-canvas{position:fixed;inset:0;width:100%;height:100%;cursor:grab}
#main-canvas:active{cursor:grabbing}

/* Panels */
.panel{
  position:fixed;z-index:10;
  background:var(--bg2);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:12px;
  padding:16px;
}

/* Top bar */
#top-bar{
  top:0;left:0;right:0;border-radius:0;border-left:none;border-right:none;border-top:none;
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(10,14,19,0.98) 0%,rgba(10,14,19,0.7) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:opacity 0.3s;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:18px;height:18px;border-radius:4px;flex-shrink:0;
  background:linear-gradient(135deg,#F2C66D,#C58CF0);
  box-shadow:0 0 0 1px rgba(255,255,255,0.1);
}
.logo-name{font-size:13px;font-weight:600;letter-spacing:-0.01em}
.logo-sep{color:var(--fg3);font-size:13px}
.logo-sub{font-size:12px;color:var(--fg2);font-family:var(--mono)}
.top-stats{display:flex;align-items:center;gap:18px;font-size:11px;color:var(--fg2)}
.top-stat span{color:var(--green)}
.top-stat span.blue{color:var(--blue)}
.top-stat span.amber{color:var(--amber)}

/* Left panel */
#left-panel{
  top:64px;left:18px;width:230px;
  display:flex;flex-direction:column;gap:14px;
  transition:opacity 0.3s;
}
.search-wrap{position:relative}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--fg2);pointer-events:none;
}
#search{
  width:100%;padding:8px 10px 8px 30px;
  background:rgba(255,255,255,0.035);
  border:1px solid var(--border);border-radius:8px;
  color:var(--fg);font-family:var(--font);font-size:12px;
  outline:none;transition:border-color 0.15s;
}
#search:focus{border-color:var(--border2)}
.section-label{
  font-size:10px;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--fg3);margin-bottom:8px;
}
.type-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 9px;border-radius:999px;
  border:1px solid var(--border2);background:rgba(255,255,255,0.04);
  color:var(--fg);font-size:11px;font-family:var(--font);
  cursor:pointer;transition:all 0.15s;
}
.chip:hover{background:rgba(255,255,255,0.08)}
.chip.off{border-color:var(--border);color:var(--fg2);background:transparent}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Minimap */
#minimap-wrap{display:flex;flex-direction:column;gap:6px}
#mini-canvas{
  width:120px;height:120px;border-radius:8px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
}
.hint-text{font-size:10px;color:var(--fg3);font-family:var(--mono)}

/* Right inspector */
#inspector{
  top:0;right:0;bottom:0;width:310px;border-radius:0;
  border-right:none;border-top:none;border-bottom:none;
  padding:58px 20px 20px;overflow-y:auto;
  transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.2,0,0,1);
}
#inspector.open{transform:translateX(0)}
#inspector-close{
  position:absolute;top:16px;right:16px;
  width:24px;height:24px;border-radius:6px;border:none;
  background:rgba(255,255,255,0.05);color:var(--fg2);
  cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
}
.insp-type{
  display:flex;align-items:center;gap:8px;margin-bottom:4px;
  font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg2);
}
.insp-dot{width:9px;height:9px;border-radius:50%}
.insp-name{
  font-family:var(--mono);font-size:17px;font-weight:500;
  margin-bottom:4px;word-break:break-all;line-height:1.3;
}
.insp-file{
  font-family:var(--mono);font-size:11px;color:var(--fg2);margin-bottom:20px;
}
.insp-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:rgba(255,255,255,0.05);border-radius:8px;
  overflow:hidden;margin-bottom:20px;
}
.insp-cell{background:var(--bg);padding:11px 13px}
.insp-cell-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg3)}
.insp-cell-val{font-size:13px;margin-top:3px;font-family:var(--mono)}
.neighbors-label{
  font-size:10px;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--fg2);margin-bottom:9px;
}
.neighbors-list{
  display:flex;flex-direction:column;gap:1px;
  background:rgba(255,255,255,0.05);border-radius:8px;overflow:hidden;
}
.neighbor-btn{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;background:var(--bg);
  border:none;cursor:pointer;text-align:left;
  color:var(--fg);font-family:var(--mono);font-size:12px;
  transition:background 0.1s;
}
.neighbor-btn:hover{background:rgba(255,255,255,0.04)}
.neighbor-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.neighbor-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.neighbor-deg{color:var(--fg3);font-size:10px}
.blast-notice{
  margin-top:20px;padding:10px 12px;
  background:rgba(242,165,90,0.07);
  border:1px solid rgba(242,165,90,0.2);border-radius:8px;
  font-size:11px;color:rgba(242,200,150,0.85);line-height:1.5;
}
.blast-notice-title{
  font-family:var(--mono);font-size:10px;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--amber);margin-bottom:3px;
}
.insp-idle{
  position:absolute;right:22px;top:50%;transform:translateY(-50%);
  width:200px;text-align:right;
  transition:opacity 0.3s;
}
.insp-idle-label{
  font-size:10px;text-transform:uppercase;letter-spacing:0.14em;
  color:var(--fg2);margin-bottom:5px;
}
.insp-idle-text{font-size:13px;color:var(--fg2);line-height:1.5}

/* Tooltip */
#tooltip{
  position:fixed;pointer-events:none;z-index:50;
  background:rgba(18,22,28,0.94);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border2);border-radius:9px;
  padding:9px 11px;min-width:190px;
  box-shadow:0 8px 28px rgba(0,0,0,0.5);
  display:none;
}
.tt-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.tt-dot{width:8px;height:8px;border-radius:50%}
.tt-name{font-family:var(--mono);font-weight:500;font-size:12px}
.tt-info{font-size:11px;color:var(--fg2);line-height:1.5}

/* Controls */
#controls{
  position:fixed;bottom:22px;right:18px;z-index:10;
  display:flex;flex-direction:column;gap:5px;
}
.ctrl-btn{
  padding:7px 13px;border-radius:9px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--fg);font-size:12px;font-family:var(--font);
  cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;
  backdrop-filter:blur(14px);
}
.ctrl-btn:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.18)}
.ctrl-btn.on{background:rgba(111,207,151,0.15);border-color:rgba(111,207,151,0.4);color:var(--green)}

/* Vignette */
#vignette{
  position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.5) 100%);
}
</style>
</head>
<body>
<canvas id="main-canvas"></canvas>
<div id="vignette"></div>

<!-- Top bar -->
<div id="top-bar">
  <div class="logo">
    <div class="logo-icon"></div>
    <span class="logo-name">AgentKit</span>
    <span style="color:#6FCF97;font-size:13px;font-weight:600">Graphify</span>
    <span class="logo-sep">·</span>
    <span class="logo-sub">Interactive Code Knowledge Graph</span>
  </div>
  <div class="top-stats">
    <div class="top-stat"><span>189</span> NODES</div>
    <div class="top-stat"><span class="blue">126</span> EDGES</div>
    <div class="top-stat"><span>7</span> COMMUNITIES</div>
    <div class="top-stat"><span class="amber">0</span> GOD NODES</div>
  </div>
</div>

<!-- Left panel -->
<div class="panel" id="left-panel">
  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" placeholder="Search nodes… (F)" autocomplete="off">
  </div>
  <div>
    <div class="section-label">Node Types</div>
    <div class="type-chips" id="type-chips"></div>
  </div>
  <div id="minimap-wrap">
    <canvas id="mini-canvas" width="240" height="240"></canvas>
    <span class="hint-text">drag · scroll · shift+drag pan</span>
  </div>
</div>

<!-- Right inspector -->
<div class="panel" id="inspector">
  <button id="inspector-close">×</button>
  <div id="inspector-content">
    <div class="insp-idle" id="insp-idle">
      <div class="insp-idle-label">Inspector</div>
      <div class="insp-idle-text">Click any node to see its neighborhood, blast radius, and connections.</div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-head">
    <span class="tt-dot" id="tt-dot"></span>
    <span class="tt-name" id="tt-name"></span>
  </div>
  <div class="tt-info" id="tt-info"></div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl-btn on" id="sim-btn" onclick="toggleSim()">⚡ Auto-rotate: ON</button>
  <button class="ctrl-btn" onclick="focusGods()">⭐ God Nodes</button>
  <button class="ctrl-btn" onclick="resetView()">↺ Reset View</button>
</div>

  canvas.addEventListener('wheel',function(e){
    e.preventDefault();
    s.zoom=Math.max(0.25,Math.min(4.5,s.zoom*Math.exp(-e.deltaY*0.0015)));
  },{passive:false});

  function pick(mx,my){
    var best=null,bd=20;
    data.nodes.forEach(function(n){
      if(!nodeOk(n)) return;
      var p=proj(n); var rad=(n.size||3)*p.scale;
      var dx=p.sx-mx,dy=p.sy-my;
      var d=Math.sqrt(dx*dx+dy*dy)-rad;
      if(d<bd){bd=d;best=n;}
    });
    return best;
  }

  function doBlast(node,depth){
    depth=depth||2;
    if(!node){s.blastSet=null;return;}
    var set=new Set([node.id]),front=[node.id];
    for(var i=0;i<depth;i++){
      var next=[];
      front.forEach(function(id){
        var adj=data.adjacency.get(id);
        if(!adj) return;
        adj.forEach(function(nb){if(!set.has(nb)){set.add(nb);next.push(nb);}});
      });
      front=next;
    }
    s.blastSet=set;
  }

  function animTo(ty,tp,tz){
    var sy=s.yaw,sp=s.pitch,sz=s.zoom,tz2=tz!==undefined?tz:s.zoom;
    var t0=performance.now(),dur=600;
    function step(now){
      var t=Math.min(1,(now-t0)/dur);
      var e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
      s.yaw=sy+(ty-sy)*e;s.pitch=sp+(tp-sp)*e;s.zoom=sz+(tz2-sz)*e;
      if(t<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  var raf;
  function loop(){if(s.autoRotate&&!s.isMini)s.yaw+=s.rotSpeed;render();raf=requestAnimationFrame(loop);}
  loop();

  return{
    state:s,
    setQuery:function(q){s.query=q;},
    setFilters:function(f){s.typeFilters=new Set(f);},
    setBlast:function(n,d){doBlast(n,d);},
    select:function(n){s.selected=n;},
    focus:function(n){if(!n)return;animTo(-Math.atan2(n.x,n.z),Math.atan2(n.y,Math.sqrt(n.x*n.x+n.z*n.z)));},
    resetView:function(){animTo(0.32,-0.18,1);s.tx=0;s.ty=0;},
    destroy:function(){cancelAnimationFrame(raf);ro.disconnect();},
    project:proj,
  };
}
window.GraphView=GraphView;
})();</script>
<script>(function(){
  var N=GPU_NODES.length, E=GPU_EDGES.length;

  // Group by community
  var commGroups={};
  GPU_NODES.forEach(function(n,i){
    var c=n.community||'0';
    if(!commGroups[c]) commGroups[c]=[];
    commGroups[c].push(i);
  });

  // Degree
  var deg=new Array(N).fill(0);
  GPU_EDGES.forEach(function(e){deg[e.s]++;deg[e.d]++;});

  // Place communities on Fibonacci sphere
  var comms=Object.keys(commGroups), C=comms.length, SR=460;
  var commPos={};
  comms.forEach(function(c,ci){
    var phi=Math.acos(1-2*(ci+0.5)/C);
    var theta=Math.PI*(1+Math.sqrt(5))*ci;
    commPos[c]=[SR*Math.sin(phi)*Math.cos(theta), SR*Math.cos(phi), SR*Math.sin(phi)*Math.sin(theta)];
  });

  // Node positions within community
  var commCur={};
  var nodes3d=GPU_NODES.map(function(n,i){
    var c=n.community||'0';
    if(!commCur[c]) commCur[c]=0;
    var li=commCur[c]++, gs=commGroups[c].length;
    var cp=commPos[c];
    var localR=Math.max(28,Math.sqrt(gs)*17);
    var phi=Math.acos(1-2*(li+0.5)/gs);
    var theta=Math.PI*(1+Math.sqrt(5))*li;
    var type=n.godNode?'god':(n.type||'function');
    return{
      id:i,
      name:n.label||'?',
      file:n.file||'',
      line:n.line||0,
      docstring:n.docstring||'',
      community:c,
      type:type,
      degree:deg[i],
      size:n.godNode?12:(type==='module'?7:type==='class'?5:type==='interface'?4.5:3.5),
      x:cp[0]+localR*Math.sin(phi)*Math.cos(theta),
      y:cp[1]+localR*Math.cos(phi),
      z:cp[2]+localR*Math.sin(phi)*Math.sin(theta),
    };
  });

  var edges3d=GPU_EDGES.map(function(e){return{source:e.s,target:e.d,type:e.t||''};});

  var adjacency=new Map();
  edges3d.forEach(function(e){
    if(!adjacency.has(e.source)) adjacency.set(e.source,new Set());
    if(!adjacency.has(e.target)) adjacency.set(e.target,new Set());
    adjacency.get(e.source).add(e.target);
    adjacency.get(e.target).add(e.source);
  });

  var TYPES={
    module:   {label:'Module',   color:'#6FCF97'},
    class:    {label:'Class',    color:'#7AA7FF'},
    function: {label:'Function', color:'#F2C66D'},
    method:   {label:'Method',   color:'#C58CF0'},
    interface:{label:'Interface',color:'#56CCF2'},
    component:{label:'Component',color:'#F2A65A'},
    god:      {label:'God Node', color:'#F2A65A'},
    default:  {label:'Other',    color:'#8090A8'},
  };

  window.GRAPH_DATA={nodes:nodes3d,edges:edges3d,types:TYPES,adjacency:adjacency};
})();</script>
<script>
(function(){
  var data = window.GRAPH_DATA;
  var TYPES = data.types;

  // ---- Init main view ----
  var mainCanvas = document.getElementById('main-canvas');
  var view = window.GraphView({
    canvas: mainCanvas,
    data: data,
    options: { bg: '#0A0E13' },
    callbacks: {
      onHover: function(node, x, y) { updateTooltip(node, x, y); },
      onClick: function(node) {
        selected = node;
        view.select(node);
        if (node) { view.setBlast(node, 2); view.focus(node); }
        else view.setBlast(null);
        updateInspector();
      },
    },
  });

  // ---- Init minimap ----
  var miniCanvas = document.getElementById('mini-canvas');
  var miniView = window.GraphView({
    canvas: miniCanvas,
    data: data,
    options: { isMinimap: true, autoRotate: true, rotationSpeed: 0.002, bg: 'transparent', showLabels: false },
  });

  // ---- State ----
  var selected = null;
  var query = '';
  var filters = new Set(Object.keys(TYPES));
  var simOn = true;

  // ---- Type chips ----
  var chipsEl = document.getElementById('type-chips');
  Object.entries(TYPES).forEach(function(entry) {
    var key = entry[0], t = entry[1];
    var btn = document.createElement('button');
    btn.className = 'chip';
    btn.setAttribute('data-type', key);
    btn.innerHTML = '<span class="chip-dot" style="background:'+t.color+'"></span>' + t.label;
    btn.addEventListener('click', function() {
      if (filters.has(key)) filters.delete(key); else filters.add(key);
      btn.className = 'chip' + (filters.has(key) ? '' : ' off');
      view.setFilters(filters);
    });
    chipsEl.appendChild(btn);
  });

  // ---- Search ----
  var searchEl = document.getElementById('search');
  searchEl.addEventListener('input', function(e) {
    query = e.target.value;
    view.setQuery(query);
  });
  document.addEventListener('keydown', function(e) {
    if ((e.key === 'f' || e.key === 'F') && document.activeElement !== searchEl) {
      e.preventDefault(); searchEl.focus();
    }
    if (e.key === 'Escape') {
      if (document.activeElement === searchEl) { searchEl.blur(); return; }
      selected = null; view.select(null); view.setBlast(null);
      updateInspector();
    }
    if (e.key === 'r' || e.key === 'R') resetView();
  });

  // ---- Tooltip ----
  var ttEl = document.getElementById('tooltip');
  var ttDot = document.getElementById('tt-dot');
  var ttName = document.getElementById('tt-name');
  var ttInfo = document.getElementById('tt-info');

  function updateTooltip(node, x, y) {
    if (!node || (selected && selected.id === node.id)) { ttEl.style.display = 'none'; return; }
    var t = TYPES[node.type] || TYPES.default || { color: '#888', label: node.type };
    ttDot.style.background = t.color;
    ttDot.style.boxShadow = '0 0 8px ' + t.color;
    ttName.textContent = node.name;
    ttInfo.innerHTML = t.label + ' &middot; ' + node.degree + ' connection' + (node.degree === 1 ? '' : 's') + '<br>' +
      '<span style="font-family:var(--mono)">' + (node.file || '') + (node.line ? ':' + node.line : '') + '</span>';
    var px = Math.min(x + 16, window.innerWidth - 210);
    var py = Math.min(y + 14, window.innerHeight - 80);
    ttEl.style.left = px + 'px';
    ttEl.style.top = py + 'px';
    ttEl.style.display = 'block';
  }

  // ---- Inspector ----
  var inspector = document.getElementById('inspector');
  var inspContent = document.getElementById('inspector-content');

  document.getElementById('inspector-close').addEventListener('click', function() {
    selected = null; view.select(null); view.setBlast(null);
    updateInspector();
  });

  function updateInspector() {
    ttEl.style.display = 'none';
    if (!selected) {
      inspector.classList.remove('open');
      inspContent.innerHTML = '<div class="insp-idle" id="insp-idle"><div class="insp-idle-label">Inspector</div>' +
        '<div class="insp-idle-text">Click any node to see its neighborhood, blast radius, and connections.</div></div>';
      return;
    }
    inspector.classList.add('open');
    var n = selected;
    var t = TYPES[n.type] || { color: '#888', label: n.type };
    var adj = data.adjacency.get(n.id) || new Set();
    var neighbors = [];
    adj.forEach(function(nid) { var nb = data.nodes[nid]; if (nb) neighbors.push(nb); });
    neighbors.sort(function(a,b) { return b.degree - a.degree; });
    var top = neighbors.slice(0, 12);

    var html = '<button id="inspector-close">×</button>';
    html += '<div class="insp-type"><span class="insp-dot" style="background:'+t.color+';box-shadow:0 0 10px '+t.color+'"></span>'+t.label+'</div>';
    html += '<div class="insp-name">'+escHtml(n.name)+'</div>';
    html += '<div class="insp-file">'+escHtml(n.file||'')+(n.line?':'+n.line:'')+'</div>';
    html += '<div class="insp-grid">';
    [ ['Connections', n.degree],
      ['Community', n.community],
      ['Blast radius', view.state.blastSet ? view.state.blastSet.size : '—'],
      ['Type', t.label],
    ].forEach(function(row) {
      html += '<div class="insp-cell"><div class="insp-cell-label">'+row[0]+'</div><div class="insp-cell-val">'+row[1]+'</div></div>';
    });
    html += '</div>';
    if (top.length) {
      html += '<div class="neighbors-label">Connected ('+top.length+(adj.size>12?'/'+adj.size:'')+')</div>';
      html += '<div class="neighbors-list">';
      top.forEach(function(nb) {
        var nt = TYPES[nb.type] || { color: '#888' };
        html += '<button class="neighbor-btn" data-nid="'+nb.id+'">' +
          '<span class="neighbor-dot" style="background:'+nt.color+'"></span>' +
          '<span class="neighbor-name">'+escHtml(nb.name)+'</span>' +
          '<span class="neighbor-deg">'+nb.degree+'</span></button>';
      });
      html += '</div>';
    }
    html += '<div class="blast-notice"><div class="blast-notice-title">Blast radius active</div>Showing 2-hop neighborhood. These nodes are affected when this one changes.</div>';
    inspContent.innerHTML = html;

    document.getElementById('inspector-close').addEventListener('click', function() {
      selected = null; view.select(null); view.setBlast(null); updateInspector();
    });
    inspContent.querySelectorAll('.neighbor-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var nid = parseInt(btn.getAttribute('data-nid'));
        var nb = data.nodes[nid];
        if (!nb) return;
        selected = nb; view.select(nb); view.setBlast(nb, 2); view.focus(nb);
        updateInspector();
      });
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- Controls ----
  window.toggleSim = function() {
    simOn = !simOn;
    view.toggleAutoRotate(simOn);
    var btn = document.getElementById('sim-btn');
    btn.className = 'ctrl-btn' + (simOn ? ' on' : '');
    btn.textContent = '⚡ Auto-rotate: ' + (simOn ? 'ON' : 'OFF');
  };
  window.focusGods = function() {
    var gods = data.nodes.filter(function(n) { return n.type === 'god'; });
    if (gods.length) view.focus(gods[0]);
  };
  window.resetView = function() { view.resetView(); };

  // ---- Chrome fade-in on hover ----
  var leftPanel = document.getElementById('left-panel');
  var topBar = document.getElementById('top-bar');
  [mainCanvas, document.body].forEach(function(el) {
    el.addEventListener('mousemove', function() {
      leftPanel.style.opacity = '1';
    });
  });

  updateInspector();
})();
</script>
</body></html>
